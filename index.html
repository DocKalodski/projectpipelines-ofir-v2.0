<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ProjectPipelines-OFIR v2.0 by Doc Kalodski</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#0f1419;color:#fff;font-family:system-ui,-apple-system,sans-serif;overflow:hidden}
.screen{display:none;width:100%;height:100%;position:fixed;inset:0;z-index:50;background:#0f1419;flex-direction:column}
.screen.active{display:flex}
#login-screen{justify-content:center;align-items:center}
.login-box{background:#1a1f26;border-radius:8px;padding:2rem;width:100%;max-width:340px;border:1px solid #2a2f36}
.login-title{font-size:18px;font-weight:700;color:#0F6E56;margin-bottom:0.5rem;text-align:center}
.login-sub{font-size:12px;color:#888;text-align:center;margin-bottom:2rem}
.login-field{margin-bottom:1rem}
.login-label{font-size:10px;color:#888;text-transform:uppercase;font-weight:600;display:block;margin-bottom:6px}
.login-input{width:100%;background:#242b32;border:1px solid #2a2f36;color:#fff;padding:8px 12px;border-radius:4px;font-size:12px}
.login-input:focus{outline:none;border-color:#0F6E56}
.login-btn{width:100%;padding:10px;background:#0F6E56;border:none;color:#fff;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;margin-top:1rem}
.login-btn:hover{background:#0d5a4a}
.login-btn:disabled{background:#555;cursor:not-allowed}
.login-error{color:#e53935;font-size:10px;margin-top:0.5rem}
.login-lockout{color:#e53935;text-align:center;font-size:11px;padding:1rem;background:#2a1515;border-radius:4px;margin-top:1rem}
#app-container{width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden}
.header{background:linear-gradient(135deg,#0C447C,#0F6E56);padding:0.75rem 1rem;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.header-title h1{font-size:16px;font-weight:700}
.header-right{display:flex;gap:8px;align-items:center}
.entity-filter{display:flex;gap:3px}
.ent-btn{padding:4px 10px;background:rgba(255,255,255,0.15);border:none;color:#fff;border-radius:3px;cursor:pointer;font-size:11px;font-weight:600}
.ent-btn.active{background:#fff;color:#0F6E56}
.user-badge{font-size:10px;color:#ccc;background:rgba(255,255,255,0.1);padding:4px 8px;border-radius:3px}
.logout-btn{padding:6px 12px;background:rgba(229,57,53,0.2);border:1px solid #e53935;color:#e53935;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600}
.tabs{display:flex;gap:4px;background:#1a1f26;padding:0.5rem;border-bottom:1px solid #2a2f36;flex-shrink:0;overflow-x:auto}
.tab-btn{padding:7px 14px;background:#242b32;border:none;color:#888;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap}
.tab-btn.active{background:#0F6E56;color:#fff}
.content{flex:1;overflow:hidden;position:relative}
.tab{display:none;height:100%;overflow-y:auto;padding:1rem}
.tab.active{display:block}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.5rem}
.kpi{background:#1a1f26;border-radius:6px;padding:0.75rem;border-left:4px solid #0F6E56;text-align:center}
.kpi-val{font-size:18px;font-weight:700;color:#0F6E56}
.kpi-lbl{font-size:9px;color:#888;text-transform:uppercase;margin-top:4px}
.tier-box{background:#1a1f26;border-radius:6px;padding:1rem;margin-bottom:1rem;border-left:4px solid #0F6E56}
.tier-box.must-win{border-left-color:#0F6E56}
.tier-box.high-value{border-left-color:#4CAF50}
.tier-box.monitor{border-left-color:#BA7517}
.tier-label{font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:8px;color:#0F6E56}
.tier-box.high-value .tier-label{color:#4CAF50}
.tier-box.monitor .tier-label{color:#BA7517}
.proj-card{background:#1a1f26;border-radius:6px;padding:0.75rem;margin-bottom:8px;cursor:pointer;transition:background 0.15s;border-left:4px solid #0F6E56}
.proj-card:hover{background:#1f2630}
.proj-name{font-size:12px;font-weight:700}
.proj-client{font-size:10px;color:#888;margin-top:2px}
.proj-badges{display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end;margin:4px 0}
.badge{font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px}
.b-ent{background:#0C447C;color:#fff}
.b-stage{background:#242b32;color:#ccc}
.b-stalled{background:#e53935;color:#fff}
.sec-h{font-size:11px;font-weight:700;color:#0F6E56;text-transform:uppercase;margin:1rem 0 8px}
.sec-h:first-child{margin-top:0}
.empty{text-align:center;padding:1rem;color:#555;font-size:11px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:100;overflow-y:auto;padding:1rem}
.overlay.open{display:flex;justify-content:center;align-items:flex-start}
.modal{background:#1a1f26;border-radius:8px;width:100%;max-width:900px;max-height:90vh;overflow-y:auto}
.mhdr{background:#242b32;padding:0.75rem 1rem;display:flex;justify-content:space-between;align-items:center;border-radius:8px 8px 0 0;position:sticky;top:0;z-index:10}
.mhdr-title{font-size:14px;font-weight:700;color:#0F6E56}
.mclose{background:none;border:none;color:#888;cursor:pointer;font-size:20px}
.detail-tabs{display:flex;gap:4px;background:#242b32;padding:0.5rem 1rem;border-bottom:1px solid #2a2f36;overflow-x:auto}
.detail-tab-btn{padding:6px 12px;background:#0f1419;border:none;color:#888;border-radius:3px;cursor:pointer;font-size:11px;font-weight:600;white-space:nowrap}
.detail-tab-btn.active{background:#0F6E56;color:#fff}
.mbody{padding:1rem}
.detail-content{display:none}
.detail-content.active{display:block}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:0.75rem}
.fg-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem}
.flbl{font-size:10px;color:#888;text-transform:uppercase;font-weight:600}
.fin{background:#242b32;border:1px solid #2a2f36;color:#fff;padding:6px 8px;border-radius:4px;font-size:11px;width:100%}
.fin:focus{outline:none;border-color:#0F6E56}
.btn{padding:7px 14px;border:none;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600}
.btn-g{background:#0F6E56;color:#fff}
.btn-x{background:#e53935;color:#fff}
.btn-q{background:#242b32;color:#ccc}
.list-item{background:#242b32;padding:8px;border-radius:4px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;font-size:11px}
.list-item-text{flex:1}
.list-item-date{font-size:9px;color:#888}
.list-delete{background:#e53935;color:#fff;border:none;padding:2px 6px;border-radius:2px;cursor:pointer;font-size:9px}
.admin-table{width:100%;border-collapse:collapse;font-size:10px}
.admin-table th{padding:8px;background:#242b32;color:#0F6E56;text-align:left;font-weight:600;border-bottom:1px solid #2a2f36}
.admin-table td{padding:8px;border-bottom:1px solid #2a2f36;color:#ccc}
.toast{position:fixed;bottom:1rem;right:1rem;background:#0F6E56;color:#fff;padding:0.75rem 1rem;border-radius:6px;font-size:12px;z-index:999;display:none;max-width:280px}
.toast.show{display:block}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#2a2f36;border-radius:2px}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" class="screen active">
  <div class="login-box">
    <div class="login-title">ProjectPipelines-OFIR v2.0</div>
    <div class="login-sub">Revenue Intelligence System by Doc Kalodski</div>
    <div class="login-field">
      <label class="login-label">Passkey</label>
      <input type="password" id="passkey-input" class="login-input" placeholder="Enter passkey" maxlength="40">
      <div class="login-error" id="pk-error"></div>
    </div>
    <button class="login-btn" id="pk-btn" onclick="submitPasskey()">Continue</button>
    <div id="lockout-msg" class="login-lockout" style="display:none"></div>
  </div>
</div>

<!-- SECURITY QUESTION SCREEN -->
<div id="sq-screen" class="screen">
  <div class="login-box">
    <div class="login-title">Security Question</div>
    <div class="login-sub" id="sq-text" style="text-align:left;margin-bottom:1.5rem;font-size:13px;color:#ccc">Question here</div>
    <div class="login-field">
      <input type="text" id="sq-input" class="login-input" placeholder="Your answer" autocomplete="off">
      <div class="login-error" id="sq-error"></div>
    </div>
    <button class="login-btn" onclick="submitSecurityQuestion()">Verify</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app-container">
  <div class="header">
    <div class="header-title">
      <h1>ProjectPipelines-OFIR v2.0</h1>
    </div>
    <div class="header-right">
      <div class="entity-filter" id="ent-filter"></div>
      <div class="user-badge" id="user-badge">Doc</div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="tabs" id="tabs-container"></div>

  <div class="content" id="content-area"></div>
</div>

<!-- PROJECT DETAIL OVERLAY -->
<div id="detail-overlay" class="overlay">
  <div class="modal">
    <div class="mhdr">
      <div class="mhdr-title" id="detail-title">Project Details</div>
      <button class="mclose" onclick="closeDetail()">×</button>
    </div>
    <div class="detail-tabs" id="detail-tabs"></div>
    <div class="mbody" id="detail-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB_URL='https://psudkrlyxulfakqbdblt.supabase.co';
const SB_KEY='sb_publishable_19FOB3kHlHm9Y_BcqIKMiA_oOLO8dvp';
const PROB={1:.10,2:.30,3:.50,4:.70,5:.90};

let sb=null;let curUser=null;let curEntity='All';let projects=[];let curProjectId=null;

async function hashSHA(str){const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));return Array.from(new Uint8Array(buf)).map(x=>x.toString(16).padStart(2,'0')).join('');}
function uid(){return crypto.getRandomValues(new Uint8Array(16)).reduce((s,b)=>s+(b<16?'0':'')+b.toString(16),'')}
function today(){return new Date().toISOString().slice(0,10)}
function fmt(n){if(!n&&n!==0)return'—';const a=Math.abs(n);if(a>=1e6)return'₱'+(n/1e6).toFixed(1)+'M';if(a>=1e3)return'₱'+(n/1e3).toFixed(0)+'K';return'₱'+Math.round(n).toLocaleString('en-PH');}
function stars(r){return'★'.repeat(r||0)+'☆'.repeat(5-(r||0))}
function daysDiff(d){if(!d)return 0;return Math.max(0,Math.floor((Date.now()-new Date(d))/86400000))}
function daysUntil(d){if(!d)return 999;return Math.floor((new Date(d)-Date.now())/86400000)}

async function initSupabase(){sb=window.supabase.createClient(SB_URL,SB_KEY);const token=sessionStorage.getItem('pp_token');if(token){try{const {data:sess}=await sb.from('pp_sessions').select('user_id,expires_at').eq('token',token).single();if(sess&&new Date(sess.expires_at)>new Date()){const {data:user}=await sb.from('pp_users').select('*').eq('id',sess.user_id).single();if(user){curUser=user;showApp();return}}}catch(e){}sessionStorage.removeItem('pp_token');}showLogin();}

async function submitPasskey(){const pk=document.getElementById('passkey-input').value;if(!pk){toast('Passkey required');return}const hash=await hashSHA(pk);let user;try{const {data}=await sb.from('pp_users').select('*').eq('passkey_hash',hash).eq('is_active',true).single();user=data;}catch(e){user=null;}if(!user){try{const {data:u}=await sb.from('pp_users').select('*').eq('passkey_hash',hash).single();if(u){u.failed_attempts=(u.failed_attempts||0)+1;if(u.failed_attempts>=3){u.locked_until=new Date(Date.now()+15*60000).toISOString()}await sb.from('pp_users').update(u).eq('passkey_hash',hash);}}catch(e){}document.getElementById('pk-error').textContent='Invalid passkey';return;}if(user.locked_until&&new Date(user.locked_until)>new Date()){showLockout(user.locked_until);return;}curUser=user;document.getElementById('sq-text').textContent=user.security_question;showScreen('sq-screen');}

async function submitSecurityQuestion(){const ans=document.getElementById('sq-input').value;if(!ans){toast('Answer required');return}const hash=await hashSHA(ans.toLowerCase());if(hash!==curUser.security_answer_hash){curUser.failed_attempts=(curUser.failed_attempts||0)+1;if(curUser.failed_attempts>=3){curUser.locked_until=new Date(Date.now()+15*60000).toISOString()}await sb.from('pp_users').update(curUser).eq('id',curUser.id);document.getElementById('sq-error').textContent='Incorrect answer';return;}const token=uid();const expires=new Date(Date.now()+8*3600000);await sb.from('pp_sessions').insert({user_id:curUser.id,token,expires_at:expires.toISOString()});sessionStorage.setItem('pp_token',token);await sb.from('pp_audit_log').insert({user_id:curUser.id,event_type:'login_success'});showApp();}

function showLockout(until){const mins=Math.ceil((new Date(until)-Date.now())/60000);document.getElementById('lockout-msg').style.display='block';document.getElementById('lockout-msg').textContent=`Account locked. Try again in ${mins} minute(s).`;document.getElementById('pk-btn').disabled=true;}

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

async function showApp(){document.getElementById('login-screen').style.display='none';document.getElementById('sq-screen').style.display='none';document.getElementById('app-container').style.display='flex';document.getElementById('user-badge').textContent=`${curUser.display_name} (${curUser.role})`;const tabs=['Dashboard','Projects','Alerts','Metrics'];if(curUser.role==='admin')tabs.push('Admin');let html='';tabs.forEach(t=>{const icon=t==='Dashboard'?'📊':t==='Projects'?'📋':t==='Alerts'?'🚨':t==='Metrics'?'📈':'⚙️';html+=`<button class="tab-btn ${t==='Dashboard'?'active':''}" onclick="switchTab('${t}',this)">${icon} ${t}</button>`;});document.getElementById('tabs-container').innerHTML=html;let ent='<button class="ent-btn active" onclick="setEntity(\'All\',this)">All</button><button class="ent-btn" onclick="setEntity(\'OHI\',this)">OHI</button><button class="ent-btn" onclick="setEntity(\'OCC\',this)">OCC</button>';if(curUser.role!=='viewer'){ent+=`<button class="btn btn-g" style="padding:4px 8px;font-size:10px;margin-left:8px" onclick="addProject()">+ Add</button>`;}document.getElementById('ent-filter').innerHTML=ent;await loadProjects();switchTab('Dashboard',document.querySelector('.tab-btn'));}

async function loadProjects(){const {data:p}=await sb.from('pp_projects').select('*').catch(()=>({data:[]}));projects=(p||[]).map(derive);}

function derive(p){const pr=PROB[p.probability_rating]||0;p.prob_pct=pr;p.expected_value=(p.contract_value||0)*pr;p.outstanding=(Math.max(0,(p.contract_value||0)-(p.collected_amount||0)));p.inactive=daysDiff(p.last_activity_date);if(p.inactive>14)p.health='Stalled';else if((p.contract_value||0)>=1000000&&['Prospect','Bid'].includes(p.stage))p.health='Risk';else p.health='Active';return p;}

function setEntity(e,btn){curEntity=e;document.querySelectorAll('.ent-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');refreshTab();}

function filtered(){return curEntity==='All'?projects:projects.filter(p=>p.entity===curEntity);}

function switchTab(name,btn){document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');if(name==='Admin'&&curUser.role==='admin'){loadAdminTab();return;}const fp=filtered();let html='';if(name==='Dashboard'){const tot=fp.reduce((s,p)=>s+(p.contract_value||0),0);const wt=fp.reduce((s,p)=>s+(p.expected_value||0),0);const col=fp.reduce((s,p)=>s+(p.collected_amount||0),0);html=`<div class="kpi-grid"><div class="kpi"><div class="kpi-val">${fmt(tot)}</div><div class="kpi-lbl">Total</div></div><div class="kpi"><div class="kpi-val">${fmt(wt)}</div><div class="kpi-lbl">Weighted</div></div><div class="kpi"><div class="kpi-val">${fmt(col)}</div><div class="kpi-lbl">Collected</div></div></div>`;const mw=fp.filter(p=>p.probability_rating===5);const hw=fp.filter(p=>p.probability_rating===4);const mon=fp.filter(p=>p.probability_rating<=3);html+=mw.length?`<div class="tier-box must-win"><div class="tier-label">🏆 MUST WIN</div>${mw.map(p=>`<div class="proj-card" onclick="openDetail('${p.id}')">${p.project_name}</div>`).join('')}</div>`:'' ;html+=hw.length?`<div class="tier-box high-value"><div class="tier-label">💰 HIGH VALUE</div>${hw.map(p=>`<div class="proj-card" onclick="openDetail('${p.id}')">${p.project_name}</div>`).join('')}</div>`:'';html+=mon.length?`<div class="tier-box monitor"><div class="tier-label">⚠️ MONITOR</div>${mon.map(p=>`<div class="proj-card" onclick="openDetail('${p.id}')">${p.project_name}</div>`).join('')}</div>`:'';}else if(name==='Projects'){html=fp.length?fp.map(p=>`<div class="proj-card" onclick="openDetail('${p.id}')"><div class="proj-name">${p.project_name}</div><div class="proj-client">${p.client||'—'}</div><div class="proj-badges"><span class="badge b-ent">${p.entity}</span><span class="badge b-stage">${p.stage}</span></div></div>`).join(''):'<div class="empty">No projects</div>';}else if(name==='Alerts'){const st=fp.filter(p=>p.health==='Stalled');const ri=fp.filter(p=>p.health==='Risk');html=`<div class="sec-h">🔴 Stalled</div>${st.length?st.map(p=>`<div class="proj-card" onclick="openDetail('${p.id}')">${p.project_name} • ${p.inactive}d inactive</div>`).join(''):'<div class="empty">None</div>'}`;html+=`<div class="sec-h">⚠️ High Risk</div>${ri.length?ri.map(p=>`<div class="proj-card" onclick="openDetail('${p.id}')">${p.project_name} • ${fmt(p.contract_value)}</div>`).join(''):'<div class="empty">None</div>'}`;}else if(name==='Metrics'){const won=fp.filter(p=>p.stage==='Won');const cr=fp.length?Math.round(won.length/fp.length*100):0;html=`<table class="admin-table"><tr><th>Metric</th><th>Value</th></tr><tr><td>Conversion</td><td>${cr}%</td></tr><tr><td>Total Pipeline</td><td>${fmt(fp.reduce((s,p)=>s+(p.contract_value||0),0))}</td></tr><tr><td>Collected</td><td>${fmt(fp.reduce((s,p)=>s+(p.collected_amount||0),0))}</td></tr></table>`;}document.getElementById('content-area').innerHTML=`<div class="tab active">${html}</div>`;}

function refreshTab(){const active=document.querySelector('.tab-btn.active');if(active)switchTab(active.textContent.trim().slice(1),active);}

async function openDetail(id){curProjectId=id;const p=projects.find(x=>x.id===id);if(!p)return;document.getElementById('detail-title').textContent=p.project_name;const tabs=['Overview','Details','Summary','Documents','History','Meetings','Actions','Resolutions'];let tabsHtml='';tabs.forEach(t=>{tabsHtml+=`<button class="detail-tab-btn ${t==='Overview'?'active':''}" onclick="switchDetailTab('${t}')">${t}</button>`;});document.getElementById('detail-tabs').innerHTML=tabsHtml;switchDetailTab('Overview');document.getElementById('detail-overlay').classList.add('open');}

function switchDetailTab(name){document.querySelectorAll('.detail-tab-btn').forEach(b=>b.classList.remove('active'));document.querySelector(`[onclick="switchDetailTab('${name}')"]`).classList.add('active');const p=projects.find(x=>x.id===curProjectId);let html='';if(name==='Overview'){html=`<div class="fg"><label class="flbl">Name</label><input class="fin" readonly value="${p.project_name}"></div><div class="fg-grid"><div class="fg"><label class="flbl">Client</label><input class="fin" id="field-client" value="${p.client||''}"></div><div class="fg"><label class="flbl">Entity</label><select class="fin" id="field-entity"><option ${p.entity==='OHI'?'selected':''}>OHI</option><option ${p.entity==='OCC'?'selected':''}>OCC</option></select></div></div><div class="fg-grid"><div class="fg"><label class="flbl">Stage</label><select class="fin" id="field-stage"><option ${p.stage==='Prospect'?'selected':''}>Prospect</option><option ${p.stage==='Bid'?'selected':''}>Bid</option><option ${p.stage==='In Progress'?'selected':''}>In Progress</option><option ${p.stage==='Waiting'?'selected':''}>Waiting</option><option ${p.stage==='Won'?'selected':''}>Won</option><option ${p.stage==='Lost'?'selected':''}>Lost</option></select></div><div class="fg"><label class="flbl">Probability</label><select class="fin" id="field-prob"><option ${p.probability_rating===1?'selected':''}>1★ (10%)</option><option ${p.probability_rating===2?'selected':''}>2★ (30%)</option><option ${p.probability_rating===3?'selected':''}>3★ (50%)</option><option ${p.probability_rating===4?'selected':''}>4★ (70%)</option><option ${p.probability_rating===5?'selected':''}>5★ (90%)</option></select></div></div><button class="btn btn-g" style="width:100%;margin-top:1rem" onclick="saveOverview()">Save</button>`;}else if(name==='Details'){html=`<div class="fg-grid"><div class="fg"><label class="flbl">Start Date</label><input class="fin" id="field-start" type="date" value="${p.start_date||''}"></div><div class="fg"><label class="flbl">Close Date</label><input class="fin" id="field-close" type="date" value="${p.expected_close_date||''}"></div></div><div class="fg"><label class="flbl">Owner</label><input class="fin" id="field-owner" value="${p.owner||''}"></div><div class="fg"><label class="flbl">Current Step</label><input class="fin" id="field-step" value="${p.current_step||''}"></div><div class="fg-grid"><div class="fg"><label class="flbl">Value (₱)</label><input class="fin" id="field-value" type="number" value="${p.contract_value||0}"></div><div class="fg"><label class="flbl">Collected (₱)</label><input class="fin" id="field-collected" type="number" value="${p.collected_amount||0}"></div></div><button class="btn btn-g" style="width:100%;margin-top:1rem" onclick="saveDetails()">Save</button>`;}else if(name==='Summary'){html=`<div class="fg"><label class="flbl">Notes</label><textarea class="fin" id="field-summary" style="height:200px">${p.summary||''}</textarea></div><button class="btn btn-g" style="width:100%" onclick="saveSummary()">Save</button>`;}else if(name==='Documents'){const docs=p.documents||[];html=`<div style="margin-bottom:1rem">${docs.length?docs.map(d=>`<div class="list-item"><div><div class="list-item-text"><strong>${d.name}</strong></div><div class="list-item-date">${d.category} • ${d.date}</div></div><button class="list-delete" onclick="deleteDocument('${p.id}','${d.name}')">Delete</button></div>`).join(''):'<div class="empty">No documents</div>'}</div><div><input class="fin" id="doc-name" placeholder="Document name"><button class="btn btn-g" style="width:100%;margin-top:8px" onclick="addDocument()">Add Link</button></div>`;}else if(name==='History'){html='<table class="admin-table"><tr><th>Event</th><th>Date</th></tr></table>';setTimeout(()=>loadHistory(p.id),100);}else if(name==='Meetings'){const mts=p.meetings||[];html=`<div>${mts.length?mts.map(m=>`<div class="list-item"><div><div class="list-item-text">${m.notes}</div><div class="list-item-date">${m.date}</div></div><button class="list-delete" onclick="deleteMeeting('${p.id}','${m.date}')">Delete</button></div>`).join(''):'<div class="empty">No meetings</div>'}</div><div style="margin-top:1rem"><input class="fin" id="meet-notes" placeholder="Meeting notes"><button class="btn btn-g" style="width:100%;margin-top:8px" onclick="addMeeting()">Add Meeting</button></div>`;}else if(name==='Actions'){const acts=p.actions||[];html=`<div>${acts.length?acts.map(a=>`<div class="list-item"><div><div class="list-item-text">${a.title}</div><div class="list-item-date">${a.owner} • ${a.status}</div></div><button class="list-delete" onclick="deleteAction('${p.id}','${a.title}')">Delete</button></div>`).join(''):'<div class="empty">No actions</div>'}</div><div style="margin-top:1rem"><input class="fin" id="act-title" placeholder="Action title"><button class="btn btn-g" style="width:100%;margin-top:8px" onclick="addAction()">Add Action</button></div>`;}else if(name==='Resolutions'){const ress=p.resolutions||[];html=`<div>${ress.length?ress.map(r=>`<div class="list-item"><div><div class="list-item-text">${r.description}</div><div class="list-item-date">${r.date}</div></div><button class="list-delete" onclick="deleteResolution('${p.id}','${r.date}')">Delete</button></div>`).join(''):'<div class="empty">No resolutions</div>'}</div><div style="margin-top:1rem"><textarea class="fin" id="res-desc" placeholder="Resolution description" style="height:60px;resize:none"></textarea><button class="btn btn-g" style="width:100%;margin-top:8px" onclick="addResolution()">Add Resolution</button></div>`;}document.getElementById('detail-body').innerHTML=html;}

async function loadHistory(id){const {data:logs}=await sb.from('pp_audit_log').select('*').eq('user_id',curUser.id).catch(()=>({data:[]}));const projLogs=logs.filter(l=>l.details&&l.details.project_id===id)||[];let html='';projLogs.forEach(l=>{html+=`<tr><td>${l.event_type}</td><td>${new Date(l.created_at).toLocaleString()}</td></tr>`;});document.querySelector('.admin-table').innerHTML+=html;}

async function saveOverview(){const upd={client:document.getElementById('field-client').value,entity:document.getElementById('field-entity').value,stage:document.getElementById('field-stage').value,probability_rating:parseInt(document.getElementById('field-prob').value.charAt(0))};await sb.from('pp_projects').update(upd).eq('id',curProjectId);await loadProjects();toast('Saved');switchTab('Dashboard',document.querySelector('.tab-btn'));}

async function saveDetails(){const upd={start_date:document.getElementById('field-start').value,expected_close_date:document.getElementById('field-close').value,owner:document.getElementById('field-owner').value,current_step:document.getElementById('field-step').value,contract_value:parseFloat(document.getElementById('field-value').value)||0,collected_amount:parseFloat(document.getElementById('field-collected').value)||0,last_activity_date:today()};await sb.from('pp_projects').update(upd).eq('id',curProjectId);await loadProjects();toast('Saved');}

async function saveSummary(){const sum=document.getElementById('field-summary').value;await sb.from('pp_projects').update({summary:sum}).eq('id',curProjectId);await loadProjects();toast('Saved');}

async function addDocument(){const name=document.getElementById('doc-name').value;if(!name)return;const p=projects.find(x=>x.id===curProjectId);const docs=p.documents||[];docs.push({name,url:'',category:'',date:today(),by:curUser.display_name});await sb.from('pp_projects').update({documents:docs}).eq('id',curProjectId);await loadProjects();switchDetailTab('Documents');}

async function deleteDocument(id,name){const p=projects.find(x=>x.id===id);const docs=(p.documents||[]).filter(d=>d.name!==name);await sb.from('pp_projects').update({documents:docs}).eq('id',id);await loadProjects();switchDetailTab('Documents');}

async function addMeeting(){const notes=document.getElementById('meet-notes').value;if(!notes)return;const p=projects.find(x=>x.id===curProjectId);const mts=p.meetings||[];mts.push({notes,date:today()});await sb.from('pp_projects').update({meetings:mts}).eq('id',curProjectId);await loadProjects();switchDetailTab('Meetings');}

async function deleteMeeting(id,date){const p=projects.find(x=>x.id===id);const mts=(p.meetings||[]).filter(m=>m.date!==date);await sb.from('pp_projects').update({meetings:mts}).eq('id',id);await loadProjects();switchDetailTab('Meetings');}

async function addAction(){const title=document.getElementById('act-title').value;if(!title)return;const p=projects.find(x=>x.id===curProjectId);const acts=p.actions||[];acts.push({title,owner:curUser.display_name,status:'Open'});await sb.from('pp_projects').update({actions:acts}).eq('id',curProjectId);await loadProjects();switchDetailTab('Actions');}

async function deleteAction(id,title){const p=projects.find(x=>x.id===id);const acts=(p.actions||[]).filter(a=>a.title!==title);await sb.from('pp_projects').update({actions:acts}).eq('id',id);await loadProjects();switchDetailTab('Actions');}

async function addResolution(){const desc=document.getElementById('res-desc').value;if(!desc)return;const p=projects.find(x=>x.id===curProjectId);const ress=p.resolutions||[];ress.push({description:desc,date:today(),by:curUser.display_name});await sb.from('pp_projects').update({resolutions:ress}).eq('id',curProjectId);await loadProjects();switchDetailTab('Resolutions');}

async function deleteResolution(id,date){const p=projects.find(x=>x.id===id);const ress=(p.resolutions||[]).filter(r=>r.date!==date);await sb.from('pp_projects').update({resolutions:ress}).eq('id',id);await loadProjects();switchDetailTab('Resolutions');}

async function addProject(){const name=prompt('Project name:');if(!name)return;const upd={project_name:name,entity:'OHI',stage:'Prospect',start_date:today(),last_activity_date:today(),updated_by:curUser.id};await sb.from('pp_projects').insert([upd]);await loadProjects();toast('Added');switchTab('Projects',document.querySelector('[onclick="switchTab(\'Projects\',this)"]'));}

async function loadAdminTab(){const {data:logs}=await sb.from('pp_audit_log').select('*').order('created_at',{ascending:false}).limit(50).catch(()=>({data:[]}));const {data:users}=await sb.from('pp_users').select('*').catch(()=>({data:[]}));let html='<h3>Audit Log</h3><table class="admin-table"><tr><th>User</th><th>Event</th><th>Date</th></tr>';logs.forEach(l=>{const u=users.find(x=>x.id===l.user_id);html+=`<tr><td>${u?.display_name||'?'}</td><td>${l.event_type}</td><td>${new Date(l.created_at).toLocaleString()}</td></tr>`;});html+='</table><h3 style="margin-top:2rem">Security</h3><table class="admin-table"><tr><th>User</th><th>Status</th></tr>';users.forEach(u=>{const locked=u.locked_until&&new Date(u.locked_until)>new Date();html+=`<tr><td>${u.display_name}</td><td>${locked?'🔴 LOCKED':'🟢 Active'} (${u.failed_attempts||0} failed)</td></tr>`;});html+='</table>';document.getElementById('content-area').innerHTML=`<div class="tab active">${html}</div>`;}

function closeDetail(){document.getElementById('detail-overlay').classList.remove('open');}

function showLogin(){document.getElementById('app-container').style.display='none';showScreen('login-screen');}

async function logout(){await sb.from('pp_audit_log').insert({user_id:curUser.id,event_type:'logout'});sessionStorage.removeItem('pp_token');location.reload();}

function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500);}

initSupabase();
</script>
</body>
</html>
